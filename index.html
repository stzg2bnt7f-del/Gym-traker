<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<title>FORGE — Tu Gimnasio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111114;
  --bg3: #18181d;
  --bg4: #202028;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --accent3: #7c4dff;
  --text: #f0f0f5;
  --text2: #888899;
  --text3: #555566;
  --red: #ff4d6d;
  --green: #4dffb4;
  --card-r: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;background:var(--bg);}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  padding-bottom:calc(80px + var(--safe-bot));
}
/* NOISE OVERLAY */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(–border2);border-radius:99px;}

/* TYPOGRAPHY */
.font-display{font-family:‘Bebas Neue’,sans-serif;letter-spacing:.03em;}

/* LAYOUT */
.screen{display:none;padding:0;animation:fadeIn .25s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* HEADER */
.header{
padding: calc(var(–safe-top) + 16px) 20px 16px;
position:sticky;top:0;
background:linear-gradient(to bottom, var(–bg) 80%, transparent);
z-index:100;
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
}
.header-inner{display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:.1em;color:var(–accent);}
.logo span{color:var(–text2);}
.header-sub{font-size:11px;color:var(–text3);text-transform:uppercase;letter-spacing:.12em;margin-top:1px;}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
background:rgba(10,10,11,.9);
backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);
border-top:1px solid var(–border);
display:flex;align-items:stretch;
padding-bottom:var(–safe-bot);
z-index:200;
}
.nav-btn{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:12px 0 10px;gap:4px;
background:none;border:none;color:var(–text3);cursor:pointer;
font-family:‘DM Sans’,sans-serif;font-size:10px;letter-spacing:.05em;
text-transform:uppercase;transition:color .2s;
}
.nav-btn.active{color:var(–accent);}
.nav-btn svg{width:22px;height:22px;transition:transform .2s;}
.nav-btn.active svg{transform:scale(1.1);}
.nav-dot{
width:4px;height:4px;border-radius:50%;
background:var(–accent);margin-top:2px;
opacity:0;transition:opacity .2s;
}
.nav-btn.active .nav-dot{opacity:1;}

/* CARDS */
.card{
background:var(–bg3);
border:1px solid var(–border);
border-radius:var(–card-r);
overflow:hidden;
}
.card-press{transition:transform .12s, opacity .12s;}
.card-press:active{transform:scale(.97);opacity:.85;}

/* SECTIONS */
.section{padding:0 16px;margin-bottom:8px;}
.section-title{
font-family:‘Bebas Neue’,sans-serif;
font-size:13px;letter-spacing:.15em;color:var(–text3);
text-transform:uppercase;padding:16px 4px 10px;
}

/* HOME SCREEN */
.streak-banner{
margin:0 16px 12px;
background:linear-gradient(135deg,#1a1a0a,#0f0f0a);
border:1px solid rgba(232,255,71,.15);
border-radius:var(–card-r);
padding:18px 20px;
display:flex;align-items:center;gap:16px;
position:relative;overflow:hidden;
}
.streak-banner::before{
content:’’;position:absolute;top:-30px;right:-20px;
width:120px;height:120px;
background:radial-gradient(circle,rgba(232,255,71,.12),transparent 70%);
pointer-events:none;
}
.streak-num{
font-family:‘Bebas Neue’,sans-serif;font-size:52px;
color:var(–accent);line-height:1;
}
.streak-label{font-size:12px;color:var(–text2);line-height:1.5;}
.streak-label strong{display:block;font-size:16px;color:var(–text);font-weight:600;}

.today-card{
margin:0 16px 8px;
background:var(–bg3);
border:1px solid var(–border);
border-radius:var(–card-r);
padding:20px;
}
.today-day{
font-family:‘Bebas Neue’,sans-serif;font-size:36px;
color:var(–text);line-height:1;
}
.today-day span{color:var(–accent);}
.today-subtitle{font-size:12px;color:var(–text2);margin-top:4px;}
.exercises-preview{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.ex-preview-item{
display:flex;align-items:center;gap:12px;
padding:10px 14px;
background:var(–bg4);border-radius:10px;
}
.ex-preview-icon{
width:34px;height:34px;border-radius:8px;
background:rgba(232,255,71,.1);
display:flex;align-items:center;justify-content:center;
font-size:16px;flex-shrink:0;
}
.ex-preview-name{font-size:14px;font-weight:500;color:var(–text);}
.ex-preview-meta{font-size:11px;color:var(–text3);margin-top:1px;}
.ex-preview-pr{
margin-left:auto;font-family:‘Bebas Neue’,sans-serif;
font-size:15px;color:var(–accent2);
}
.btn-start{
width:100%;margin-top:16px;
background:var(–accent);color:#0a0a0b;
border:none;border-radius:12px;
padding:16px;font-family:‘Bebas Neue’,sans-serif;
font-size:20px;letter-spacing:.1em;cursor:pointer;
transition:transform .12s, box-shadow .2s;
box-shadow:0 0 30px rgba(232,255,71,.2);
}
.btn-start:active{transform:scale(.97);}

.stats-row{
margin:0 16px 8px;
display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.stat-mini{
background:var(–bg3);border:1px solid var(–border);
border-radius:12px;padding:14px 12px;
display:flex;flex-direction:column;gap:4px;
}
.stat-mini-val{
font-family:‘Bebas Neue’,sans-serif;font-size:24px;color:var(–text);
}
.stat-mini-val.green{color:var(–green);}
.stat-mini-val.orange{color:var(–accent2);}
.stat-mini-label{font-size:10px;color:var(–text3);text-transform:uppercase;letter-spacing:.08em;}

.recent-prs{margin:0 16px 8px;}
.pr-item{
display:flex;align-items:center;gap:14px;
padding:12px 0;border-bottom:1px solid var(–border);
}
.pr-item:last-child{border-bottom:none;}
.pr-badge{
background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.3);
color:var(–accent2);border-radius:6px;padding:3px 8px;
font-family:‘Bebas Neue’,sans-serif;font-size:13px;
white-space:nowrap;
}
.pr-name{font-size:13px;color:var(–text);flex:1;}
.pr-val{font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–text);}
.pr-unit{font-size:10px;color:var(–text3);}

/* WORKOUT SCREEN */
.day-tabs{
display:flex;gap:8px;padding:0 16px 16px;
overflow-x:auto;scrollbar-width:none;
}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{
flex-shrink:0;padding:8px 16px;
border-radius:99px;border:1px solid var(–border);
background:transparent;color:var(–text2);
font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:500;
cursor:pointer;transition:all .2s;white-space:nowrap;
}
.day-tab.active{background:var(–accent);color:#0a0a0b;border-color:var(–accent);}
.day-tab.has-workout{border-color:rgba(232,255,71,.3);}
.day-tab.rest{color:var(–text3);}

.exercise-card{
margin:0 16px 10px;
background:var(–bg3);border:1px solid var(–border);
border-radius:var(–card-r);overflow:hidden;
}
.exercise-header{
padding:16px 16px 12px;
display:flex;align-items:center;gap:12px;
cursor:pointer;
}
.exercise-emoji{
width:40px;height:40px;border-radius:10px;
background:var(–bg4);display:flex;align-items:center;justify-content:center;
font-size:20px;flex-shrink:0;
}
.exercise-info{flex:1;}
.exercise-name{font-size:15px;font-weight:600;color:var(–text);}
.exercise-meta{font-size:12px;color:var(–text3);margin-top:2px;}
.exercise-pr-badge{
display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.pr-current{font-family:‘Bebas Neue’,sans-serif;font-size:20px;color:var(–accent2);}
.pr-current-unit{font-size:10px;color:var(–text3);}
.pr-label-small{font-size:9px;color:var(–text3);text-transform:uppercase;letter-spacing:.08em;}

.sets-container{padding:0 16px 16px;}
.set-row{
display:grid;grid-template-columns:32px 1fr 1fr 1fr 40px;
gap:8px;align-items:center;
padding:8px 0;border-bottom:1px solid var(–border);
}
.set-row:last-child{border-bottom:none;}
.set-num{
font-family:‘Bebas Neue’,sans-serif;font-size:18px;
color:var(–text3);text-align:center;
}
.set-label{font-size:10px;color:var(–text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;text-align:center;}
.set-input{
background:var(–bg4);border:1px solid var(–border);
border-radius:8px;padding:10px 6px;text-align:center;
color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:15px;font-weight:600;
width:100%;outline:none;-webkit-appearance:none;
transition:border-color .2s;
}
.set-input:focus{border-color:var(–accent2);}
.set-input.pr-beat{border-color:var(–accent);animation:prGlow .5s ease;}
@keyframes prGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(232,255,71,.5);}}
.set-done-btn{
width:36px;height:36px;border-radius:8px;
background:var(–bg4);border:1px solid var(–border);
display:flex;align-items:center;justify-content:center;
cursor:pointer;transition:all .2s;
}
.set-done-btn.done{background:rgba(77,255,180,.15);border-color:rgba(77,255,180,.4);}

.add-set-btn{
width:100%;padding:10px;margin-top:4px;
background:none;border:1px dashed var(–border2);
border-radius:10px;color:var(–text3);
font-family:‘DM Sans’,sans-serif;font-size:13px;
cursor:pointer;transition:all .2s;
}
.add-set-btn:active{background:var(–bg4);}

/* REST TIMER */
.rest-timer{
position:fixed;bottom:80px;left:16px;right:16px;
background:var(–bg3);border:1px solid var(–accent);
border-radius:var(–card-r);padding:16px 20px;
display:flex;align-items:center;gap:16px;
z-index:150;transform:translateY(120px);
transition:transform .3s cubic-bezier(.34,1.56,.64,1);
box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.rest-timer.visible{transform:translateY(0);}
.rest-timer-circle{
width:52px;height:52px;position:relative;flex-shrink:0;
}
.rest-timer-circle svg{transform:rotate(-90deg);}
.rest-circle-bg{stroke:var(–bg4);stroke-width:4;fill:none;}
.rest-circle-prog{
stroke:var(–accent);stroke-width:4;fill:none;
stroke-linecap:round;
stroke-dasharray:138;stroke-dashoffset:0;
transition:stroke-dashoffset .9s linear;
}
.rest-timer-num{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–accent);
}
.rest-timer-info{flex:1;}
.rest-timer-title{font-size:13px;font-weight:600;color:var(–text);}
.rest-timer-sub{font-size:11px;color:var(–text3);margin-top:2px;}
.rest-skip-btn{
background:var(–bg4);border:1px solid var(–border);
border-radius:8px;padding:8px 14px;
color:var(–text2);font-family:‘DM Sans’,sans-serif;font-size:12px;
cursor:pointer;
}

/* PROGRESS SCREEN */
.ex-select-scroll{
display:flex;gap:8px;padding:0 16px 12px;
overflow-x:auto;scrollbar-width:none;
}
.ex-select-scroll::-webkit-scrollbar{display:none;}
.ex-chip{
flex-shrink:0;padding:8px 14px;
border-radius:99px;border:1px solid var(–border);
background:transparent;color:var(–text2);
font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.ex-chip.active{background:var(–accent3);color:#fff;border-color:var(–accent3);}

.progress-chart-wrap{
margin:0 16px 16px;
background:var(–bg3);border:1px solid var(–border);
border-radius:var(–card-r);padding:20px 16px 12px;
}
.chart-title{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:var(–text);margin-bottom:4px;}
.chart-sub{font-size:11px;color:var(–text3);margin-bottom:16px;}
.chart-area{position:relative;height:140px;margin-bottom:8px;}
canvas#progressChart{width:100%;height:100%;}

.pr-showcase{
margin:0 16px 12px;
background:linear-gradient(135deg,#1a0a0a,#0f0a14);
border:1px solid rgba(255,107,53,.2);
border-radius:var(–card-r);padding:20px;
display:flex;align-items:center;gap:16px;
position:relative;overflow:hidden;
}
.pr-showcase::before{
content:‘🏆’;position:absolute;right:-8px;bottom:-8px;
font-size:80px;opacity:.08;
}
.pr-showcase-val{
font-family:‘Bebas Neue’,sans-serif;font-size:56px;
color:var(–accent2);line-height:1;
}
.pr-showcase-info{flex:1;}
.pr-showcase-name{font-size:16px;font-weight:600;color:var(–text);}
.pr-showcase-date{font-size:11px;color:var(–text3);margin-top:4px;}
.pr-showcase-unit{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:var(–text3);}
.pr-improvement{
display:inline-flex;align-items:center;gap:4px;
background:rgba(77,255,180,.12);border:1px solid rgba(77,255,180,.2);
border-radius:99px;padding:4px 10px;
font-size:12px;font-weight:600;color:var(–green);margin-top:8px;
}

.history-list{margin:0 16px;}
.history-item{
padding:14px 0;border-bottom:1px solid var(–border);
display:flex;align-items:center;gap:12px;
}
.history-item:last-child{border-bottom:none;}
.history-date{
font-size:11px;color:var(–text3);width:50px;flex-shrink:0;
text-align:center;line-height:1.4;
}
.history-sets{flex:1;}
.history-set-row{
display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;
}
.history-set-tag{
background:var(–bg4);border-radius:6px;
padding:3px 8px;font-size:11px;color:var(–text2);
}
.history-set-tag.was-pr{
background:rgba(255,107,53,.12);
border:1px solid rgba(255,107,53,.25);
color:var(–accent2);
}
.history-vol{
font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–text);
text-align:right;
}
.history-vol-unit{font-size:10px;color:var(–text3);}

/* ROUTINES SCREEN */
.routine-day-card{
margin:0 16px 10px;
background:var(–bg3);border:1px solid var(–border);
border-radius:var(–card-r);overflow:hidden;
}
.routine-day-header{
padding:14px 16px;display:flex;align-items:center;gap:12px;
cursor:pointer;
}
.routine-day-name{
font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:var(–text);flex:1;
}
.routine-day-name span{color:var(–accent);margin-left:8px;font-size:14px;}
.routine-day-tag{
font-size:11px;color:var(–text3);
background:var(–bg4);border-radius:99px;padding:4px 10px;
}
.routine-day-body{display:none;padding:0 16px 16px;border-top:1px solid var(–border);}
.routine-day-body.open{display:block;}
.routine-ex-row{
display:flex;align-items:center;gap:12px;
padding:10px 0;border-bottom:1px solid var(–border);
}
.routine-ex-row:last-of-type{border-bottom:none;}
.routine-ex-emoji{font-size:22px;width:30px;text-align:center;}
.routine-ex-info{flex:1;}
.routine-ex-name{font-size:14px;font-weight:500;color:var(–text);}
.routine-ex-config{font-size:11px;color:var(–text3);margin-top:2px;}
.routine-ex-actions{display:flex;gap:8px;}
.icon-btn{
width:32px;height:32px;border-radius:8px;
background:var(–bg4);border:1px solid var(–border);
display:flex;align-items:center;justify-content:center;
cursor:pointer;transition:all .15s;
}
.icon-btn:active{transform:scale(.92);}
.icon-btn.danger:active{background:rgba(255,77,109,.15);}

.add-exercise-btn{
width:100%;padding:12px;margin-top:12px;
background:none;border:1px dashed var(–border2);
border-radius:10px;color:var(–text2);
font-family:‘DM Sans’,sans-serif;font-size:14px;
cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
transition:all .2s;
}
.add-exercise-btn:active{background:var(–bg4);}

.add-day-btn{
margin:0 16px;width:calc(100% - 32px);padding:14px;
background:none;border:1px dashed var(–border2);
border-radius:var(–card-r);color:var(–text2);
font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:.08em;
cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
transition:all .2s;
}
.add-day-btn:active{background:var(–bg3);}

/* MODALS */
.modal-overlay{
position:fixed;inset:0;background:rgba(0,0,0,.75);
z-index:500;display:none;align-items:flex-end;justify-content:center;
backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.modal-overlay.open{display:flex;}
.modal{
background:var(–bg2);border-radius:24px 24px 0 0;
border-top:1px solid var(–border2);
width:100%;max-height:90dvh;overflow-y:auto;
padding:24px 20px calc(24px + var(–safe-bot));
animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{
width:36px;height:4px;border-radius:99px;
background:var(–border2);margin:-8px auto 20px;
}
.modal-title{
font-family:‘Bebas Neue’,sans-serif;font-size:28px;
color:var(–text);margin-bottom:20px;
}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(–text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block;}
.form-input{
width:100%;background:var(–bg3);border:1px solid var(–border2);
border-radius:12px;padding:14px 16px;
color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:15px;
outline:none;-webkit-appearance:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(–accent3);}
.form-select{
width:100%;background:var(–bg3);border:1px solid var(–border2);
border-radius:12px;padding:14px 16px;
color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:15px;
outline:none;-webkit-appearance:none;cursor:pointer;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-primary{
width:100%;padding:16px;background:var(–accent3);
color:#fff;border:none;border-radius:12px;
font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:.08em;
cursor:pointer;transition:opacity .2s;margin-top:8px;
}
.btn-primary:active{opacity:.85;}
.btn-secondary{
width:100%;padding:14px;background:var(–bg4);
color:var(–text2);border:1px solid var(–border);border-radius:12px;
font-family:‘DM Sans’,sans-serif;font-size:15px;
cursor:pointer;margin-top:8px;
}

/* CELEBRATION */
.pr-celebration{
position:fixed;inset:0;z-index:1000;
display:none;align-items:center;justify-content:center;
pointer-events:none;
}
.pr-celebration.show{display:flex;}
.pr-celebrate-card{
background:linear-gradient(135deg,var(–bg3),#1a0f0a);
border:2px solid var(–accent2);
border-radius:24px;padding:32px 40px;text-align:center;
animation:celebPop .5s cubic-bezier(.34,1.56,.64,1);
pointer-events:all;box-shadow:0 20px 80px rgba(255,107,53,.3);
}
@keyframes celebPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.celebrate-emoji{font-size:64px;animation:bounce 1s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.celebrate-title{
font-family:‘Bebas Neue’,sans-serif;font-size:36px;
color:var(–accent2);margin:8px 0 4px;
}
.celebrate-sub{font-size:14px;color:var(–text2);}
.celebrate-val{
font-family:‘Bebas Neue’,sans-serif;font-size:52px;
color:var(–accent);margin:8px 0;
}

/* EMPTY STATE */
.empty-state{
text-align:center;padding:48px 32px;
display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon{font-size:48px;opacity:.5;}
.empty-title{font-family:‘Bebas Neue’,sans-serif;font-size:22px;color:var(–text2);}
.empty-sub{font-size:13px;color:var(–text3);line-height:1.6;}

/* CONFETTI */
.confetti-piece{
position:fixed;width:8px;height:8px;
pointer-events:none;z-index:999;
animation:confettiFall 2s ease-in forwards;
}
@keyframes confettiFall{
0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
100%{transform:translateY(100dvh) rotate(720deg);opacity:0;}
}

/* WORKOUT SESSION */
.session-header{
margin:0 16px 16px;
background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(124,77,255,.08));
border:1px solid rgba(255,107,53,.2);
border-radius:var(–card-r);padding:16px;
display:flex;align-items:center;gap:16px;
}
.session-timer{
font-family:‘Bebas Neue’,sans-serif;font-size:42px;
color:var(–accent2);line-height:1;
}
.session-info{flex:1;}
.session-title{font-size:15px;font-weight:600;color:var(–text);}
.session-sub{font-size:11px;color:var(–text3);margin-top:3px;}
.btn-end-session{
background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);
border-radius:10px;padding:10px 14px;
color:var(–red);font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;
cursor:pointer;
}

/* VOLUME BAR */
.volume-bar-wrap{
margin:8px 16px 12px;
background:var(–bg3);border:1px solid var(–border);
border-radius:var(–card-r);padding:14px 16px;
}
.volume-bar-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.volume-bar-label{font-size:11px;color:var(–text3);text-transform:uppercase;letter-spacing:.08em;}
.volume-bar-val{font-family:‘Bebas Neue’,sans-serif;font-size:16px;color:var(–text);}
.volume-bar{height:6px;background:var(–bg4);border-radius:99px;overflow:hidden;}
.volume-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(–accent3),var(–accent2));transition:width .5s ease;}

/* MUSCLE MAP */
.muscle-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;}
.muscle-chip{
padding:5px 12px;border-radius:99px;
background:var(–bg3);border:1px solid var(–border);
font-size:12px;color:var(–text2);
}

/* PR HISTORY TABLE */
.pr-table{margin:0 16px;width:calc(100% - 32px);}
.pr-table-row{
display:grid;grid-template-columns:1fr auto auto;gap:8px;
padding:10px 0;border-bottom:1px solid var(–border);align-items:center;
}
.pr-table-row.header{padding:0 0 8px;}
.pr-table-row.header *{font-size:10px;color:var(–text3);text-transform:uppercase;letter-spacing:.08em;}
.pr-table-name{font-size:13px;color:var(–text);}
.pr-table-weight{font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–accent2);}
.pr-table-date{font-size:11px;color:var(–text3);}
</style>

</head>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const DB = {
  get(key, def) {
    try { const v = localStorage.getItem('forge_'+key); return v ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set(key, val) {
    try { localStorage.setItem('forge_'+key, JSON.stringify(val)); } catch {}
  }
};

// Initial demo data
function initData() {
  if (!DB.get('initialized', false)) {
    const routines = [
      {
        id: 'r1', name: 'Lunes — Push', weekday: 0,
        exercises: [
          { id: 'e1', name: 'Press Banca', emoji: '🏋️', sets: 4, reps: 10, weight: 80, rest: 90, type: 'weight' },
          { id: 'e2', name: 'Press Militar', emoji: '💪', sets: 4, reps: 10, weight: 50, rest: 90, type: 'weight' },
          { id: 'e3', name: 'Fondos', emoji: '🤸', sets: 3, reps: 12, weight: 0, rest: 60, type: 'bodyweight' },
          { id: 'e4', name: 'Extensiones Tríceps', emoji: '🦾', sets: 3, reps: 15, weight: 20, rest: 60, type: 'weight' }
        ]
      },
      {
        id: 'r2', name: 'Martes — Pull', weekday: 1,
        exercises: [
          { id: 'e5', name: 'Dominadas', emoji: '🔝', sets: 4, reps: 8, weight: 0, rest: 120, type: 'bodyweight' },
          { id: 'e6', name: 'Remo con Barra', emoji: '🚣', sets: 4, reps: 10, weight: 70, rest: 90, type: 'weight' },
          { id: 'e7', name: 'Curl Bíceps', emoji: '💪', sets: 3, reps: 12, weight: 30, rest: 60, type: 'weight' },
          { id: 'e8', name: 'Face Pulls', emoji: '🎯', sets: 3, reps: 15, weight: 20, rest: 60, type: 'weight' }
        ]
      },
      {
        id: 'r3', name: 'Miércoles — Piernas', weekday: 2,
        exercises: [
          { id: 'e9', name: 'Sentadilla', emoji: '🦵', sets: 5, reps: 8, weight: 100, rest: 120, type: 'weight' },
          { id: 'e10', name: 'Peso Muerto', emoji: '⚡', sets: 4, reps: 6, weight: 120, rest: 150, type: 'weight' },
          { id: 'e11', name: 'Prensa', emoji: '🏗️', sets: 3, reps: 12, weight: 160, rest: 90, type: 'weight' },
          { id: 'e12', name: 'Gemelos', emoji: '🦶', sets: 4, reps: 20, weight: 60, rest: 60, type: 'weight' }
        ]
      },
      {
        id: 'r4', name: 'Viernes — Full Body', weekday: 4,
        exercises: [
          { id: 'e13', name: 'Clean & Press', emoji: '🔥', sets: 4, reps: 6, weight: 60, rest: 120, type: 'weight' },
          { id: 'e14', name: 'Burpees', emoji: '🌀', sets: 4, reps: 15, weight: 0, rest: 90, type: 'bodyweight' },
          { id: 'e15', name: 'Planchas', emoji: '🧱', sets: 3, reps: 60, weight: 0, rest: 60, type: 'time' },
        ]
      }
    ];
    DB.set('routines', routines);
    // Some sample history
    const today = new Date();
    const hist = {};
    // generate some fake previous sessions
    ['e1','e2','e5','e6','e9','e10'].forEach(id => {
      hist[id] = [];
      for(let i=14;i>0;i--) {
        const d = new Date(today); d.setDate(d.getDate()-i*3);
        const base = {e1:80,e2:50,e5:0,e6:70,e9:100,e10:120}[id];
        const prog = base + Math.floor(i*1.5);
        hist[id].push({
          date: d.toISOString().split('T')[0],
          sets: [{reps:10,weight:prog},{reps:10,weight:prog},{reps:9,weight:prog},{reps:8,weight:prog}]
        });
      }
    });
    DB.set('history', hist);
    const prs = {};
    ['e1','e2','e5','e6','e9','e10'].forEach(id => {
      const base = {e1:80,e2:50,e5:20,e6:70,e9:100,e10:120}[id];
      const names = {e1:'Press Banca',e2:'Press Militar',e5:'Dominadas',e6:'Remo con Barra',e9:'Sentadilla',e10:'Peso Muerto'};
      prs[id] = {weight: base+21, reps:10, date: new Date(today.getTime()-3*86400000).toISOString().split('T')[0], name: names[id]};
    });
    DB.set('prs', prs);
    DB.set('streak', 5);
    DB.set('total_workouts', 23);
    DB.set('initialized', true);
  }
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentScreen = 'home';
let currentDayId = null;
let sessionActive = false;
let sessionStart = null;
let sessionTimerInterval = null;
let restTimerInterval = null;
let restRemaining = 0;
let restTotal = 0;
let editingDayId = null;
let editingExId = null;
let selectedProgressEx = null;
let progressChart = null;

const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const EMOJIS = ['🏋️','💪','🦵','🔥','⚡','🤸','🎯','🚣','🔝','🦾','🧱','🌀','🏗️','🦶','🎽','💥','🥊','🧗','🏃','⛹️'];

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  currentScreen = name;
  if (name==='home') renderHome();
  if (name==='workout') renderWorkout();
  if (name==='progress') renderProgress();
  if (name==='routines') renderRoutines();
}

// ═══════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════
function renderHome() {
  const el = document.getElementById('home-content');
  const routines = DB.get('routines', []);
  const streak = DB.get('streak', 0);
  const total = DB.get('total_workouts', 0);
  const prs = DB.get('prs', {});

  // Today
  const now = new Date();
  const wd = now.getDay() === 0 ? 6 : now.getDay()-1;
  const todayRoutine = routines.find(r => r.weekday === wd);
  const days = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  document.getElementById('home-date-label').textContent =
    now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase());

  // Total volume (last 7 sessions)
  const hist = DB.get('history', {});
  let weekVol = 0;
  const weekAgo = new Date(now.getTime()-7*86400000).toISOString().split('T')[0];
  Object.values(hist).forEach(sessions => {
    sessions.filter(s=>s.date>=weekAgo).forEach(s => {
      s.sets.forEach(set => { weekVol += (set.weight||0)*(set.reps||0); });
    });
  });

  // Recent PRs
  const prList = Object.entries(prs).slice(-4).reverse();

  let html = `
  <div class="streak-banner">
    <div class="streak-num">${streak}</div>
    <div>
      <div class="streak-label"><strong>Racha actual</strong>días entrenando</div>
      <div style="margin-top:6px;font-size:11px;color:var(--text3);">🔥 ¡Sigue así!</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-mini">
      <div class="stat-mini-val">${total}</div>
      <div class="stat-mini-label">Entrenos</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val green">${Math.round(weekVol/1000)}k</div>
      <div class="stat-mini-label">Volumen 7d</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-val orange">${prList.length}</div>
      <div class="stat-mini-label">PRs totales</div>
    </div>
  </div>`;

  if (todayRoutine) {
    html += `<div class="today-card">
      <div class="today-day">${days[wd].toUpperCase()} <span>HOY</span></div>
      <div class="today-subtitle">${todayRoutine.name} · ${todayRoutine.exercises.length} ejercicios</div>
      <div class="exercises-preview">`;
    todayRoutine.exercises.slice(0,3).forEach(ex => {
      const pr = prs[ex.id];
      html += `<div class="ex-preview-item">
        <div class="ex-preview-icon">${ex.emoji}</div>
        <div>
          <div class="ex-preview-name">${ex.name}</div>
          <div class="ex-preview-meta">${ex.sets}×${ex.reps} · ${ex.rest}s descanso</div>
        </div>
        ${pr ? `<div class="ex-preview-pr">${pr.weight}<span style="font-size:10px;color:var(--text3)">kg</span></div>` : ''}
      </div>`;
    });
    if (todayRoutine.exercises.length > 3) {
      html += `<div style="text-align:center;font-size:12px;color:var(--text3);padding:4px 0">+${todayRoutine.exercises.length-3} más</div>`;
    }
    html += `</div>
      <button class="btn-start" onclick="startSession('${todayRoutine.id}')">
        EMPEZAR ENTRENO
      </button>
    </div>`;
  } else {
    html += `<div class="today-card">
      <div class="today-day">${days[wd].toUpperCase()} <span style="color:var(--text3)">HOY</span></div>
      <div class="today-subtitle">Día de descanso 😴</div>
      <div style="margin-top:16px;padding:20px;text-align:center;background:var(--bg4);border-radius:12px;">
        <div style="font-size:32px;margin-bottom:8px;">🛌</div>
        <div style="font-size:13px;color:var(--text3)">El descanso también es entrenamiento. Recupera bien.</div>
      </div>
      <button class="btn-start" style="background:var(--bg4);color:var(--text2);box-shadow:none;margin-top:12px;" onclick="showScreen('routines')">
        VER RUTINAS
      </button>
    </div>`;
  }

  if (prList.length > 0) {
    html += `<div class="section"><div class="section-title">Mis PRs</div></div>
    <div class="recent-prs card" style="margin:0 16px;padding:0 16px;">`;
    prList.forEach(([id, pr]) => {
      html += `<div class="pr-item">
        <div class="pr-badge">PR</div>
        <div class="pr-name">${pr.name || id}</div>
        <div><div class="pr-val">${pr.weight}<span class="pr-unit">kg</span></div></div>
      </div>`;
    });
    html += '</div>';
  }

  html += '<div style="height:8px;"></div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// WORKOUT SCREEN
// ═══════════════════════════════════════════
function renderWorkout(activeDayId) {
  const el = document.getElementById('workout-content');
  const routines = DB.get('routines', []);
  if (!routines.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin rutinas</div><div class="empty-sub">Crea tu primera rutina en la pestaña Rutinas para empezar a entrenar.</div><button class="btn-primary" style="margin-top:16px;width:auto;padding:12px 24px;" onclick="showScreen('routines')">CREAR RUTINA</button></div>`;
    return;
  }
  if (!activeDayId) activeDayId = currentDayId || routines[0].id;
  currentDayId = activeDayId;
  const day = routines.find(r => r.id === activeDayId);
  document.getElementById('workout-header-sub').textContent = day ? day.name : '';

  let html = '<div class="day-tabs">';
  routines.forEach(r => {
    html += `<button class="day-tab ${r.id===activeDayId?'active':''} has-workout" onclick="renderWorkout('${r.id}')">${r.name}</button>`;
  });
  html += '</div>';

  if (sessionActive && currentDayId === activeDayId) {
    const elapsed = Math.floor((Date.now()-sessionStart)/1000);
    html += `<div class="session-header">
      <div class="session-timer" id="sessionClock">${formatTime(elapsed)}</div>
      <div class="session-info">
        <div class="session-title">Sesión activa 🔥</div>
        <div class="session-sub">${day.name}</div>
      </div>
      <button class="btn-end-session" onclick="openModal('modal-finish-workout');buildFinishSummary()">FIN</button>
    </div>`;
  } else {
    html += `<div style="padding:0 16px 12px;">
      <button class="btn-start" onclick="startSession('${activeDayId}')">EMPEZAR ENTRENO</button>
    </div>`;
  }

  const prs = DB.get('prs', {});
  if (day) {
    day.exercises.forEach((ex, exIdx) => {
      const pr = prs[ex.id];
      html += `<div class="exercise-card" id="excard-${ex.id}">
        <div class="exercise-header" onclick="toggleSets('sets-${ex.id}')">
          <div class="exercise-emoji">${ex.emoji}</div>
          <div class="exercise-info">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-meta">${ex.sets} series · ${ex.reps} reps · ${ex.rest}s desc.</div>
          </div>
          <div class="exercise-pr-badge">
            ${pr ? `<div class="pr-current">${pr.weight}</div><div class="pr-current-unit">kg PR</div>` : '<div style="font-size:11px;color:var(--text3);">Sin PR</div>'}
          </div>
        </div>
        <div class="sets-container" id="sets-${ex.id}" style="display:${exIdx===0?'block':'none'}">
          <div style="display:grid;grid-template-columns:32px 1fr 1fr 1fr 40px;gap:8px;padding:0 0 8px;">
            <div class="set-label">#</div>
            <div class="set-label">REPS</div>
            <div class="set-label">PESO kg</div>
            <div class="set-label">VOL</div>
            <div></div>
          </div>
          <div id="setrows-${ex.id}">`;

      for(let s=0;s<ex.sets;s++) {
        html += buildSetRow(ex, s, pr);
      }
      html += `</div>
          <button class="add-set-btn" onclick="addSetRow('${ex.id}','${day.id}')">+ Añadir serie</button>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
  if (sessionActive) startSessionTimer();
  setupVolumeListeners(day);
}

function buildSetRow(ex, idx, pr) {
  const prevWeight = pr ? pr.weight : ex.weight;
  return `<div class="set-row" id="setrow-${ex.id}-${idx}">
    <div class="set-num">${idx+1}</div>
    <input type="number" class="set-input" id="reps-${ex.id}-${idx}" 
      placeholder="${ex.reps}" min="0" max="999" inputmode="numeric"
      onchange="updateVolume('${ex.id}',${idx})" oninput="checkPR('${ex.id}',${idx})">
    <input type="number" class="set-input" id="weight-${ex.id}-${idx}" 
      placeholder="${prevWeight||0}" step="0.5" min="0" max="9999" inputmode="decimal"
      onchange="updateVolume('${ex.id}',${idx})" oninput="checkPR('${ex.id}',${idx})">
    <div class="set-input" id="vol-${ex.id}-${idx}" style="color:var(--text3);font-size:13px;">—</div>
    <div class="set-done-btn" id="done-${ex.id}-${idx}" onclick="toggleSetDone('${ex.id}',${idx})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>`;
}

function toggleSets(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

function addSetRow(exId, dayId) {
  const routines = DB.get('routines', []);
  const day = routines.find(r => r.id===dayId);
  if (!day) return;
  const ex = day.exercises.find(e => e.id===exId);
  if (!ex) return;
  const container = document.getElementById('setrows-'+exId);
  const count = container.querySelectorAll('.set-row').length;
  const prs = DB.get('prs', {});
  container.insertAdjacentHTML('beforeend', buildSetRow(ex, count, prs[exId]));
}

function toggleSetDone(exId, idx) {
  const btn = document.getElementById(`done-${exId}-${idx}`);
  btn.classList.toggle('done');
  btn.innerHTML = btn.classList.contains('done')
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4dffb4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  if (btn.classList.contains('done')) {
    const routines = DB.get('routines', []);
    const day = routines.find(r => r.id===currentDayId);
    if (day) {
      const ex = day.exercises.find(e=>e.id===exId);
      if (ex) startRest(ex.rest, ex.name);
    }
  }
}

function updateVolume(exId, idx) {
  const r = parseFloat(document.getElementById(`reps-${exId}-${idx}`)?.value)||0;
  const w = parseFloat(document.getElementById(`weight-${exId}-${idx}`)?.value)||0;
  const vol = document.getElementById(`vol-${exId}-${idx}`);
  if (vol) vol.textContent = r&&w ? Math.round(r*w)+'kg' : '—';
}

function checkPR(exId, idx) {
  const w = parseFloat(document.getElementById(`weight-${exId}-${idx}`)?.value)||0;
  const prs = DB.get('prs', {});
  const currentPR = prs[exId]?.weight||0;
  const wInput = document.getElementById(`weight-${exId}-${idx}`);
  if (w > currentPR && w > 0) {
    wInput?.classList.add('pr-beat');
  } else {
    wInput?.classList.remove('pr-beat');
  }
  updateVolume(exId, idx);
}

function setupVolumeListeners(day) {
  if (!day) return;
  day.exercises.forEach(ex => {
    for(let i=0;i<ex.sets;i++) {
      const ri = document.getElementById(`reps-${ex.id}-${i}`);
      const wi = document.getElementById(`weight-${ex.id}-${i}`);
      if(ri) ri.addEventListener('input', ()=>updateVolume(ex.id,i));
      if(wi) wi.addEventListener('input', ()=>updateVolume(ex.id,i));
    }
  });
}

// ═══════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════
function startSession(dayId) {
  currentDayId = dayId;
  sessionActive = true;
  sessionStart = Date.now();
  showScreen('workout');
  renderWorkout(dayId);
  startSessionTimer();
}

function startSessionTimer() {
  if (sessionTimerInterval) clearInterval(sessionTimerInterval);
  sessionTimerInterval = setInterval(()=>{
    const el = document.getElementById('sessionClock');
    if (el) el.textContent = formatTime(Math.floor((Date.now()-sessionStart)/1000));
  }, 1000);
}

function buildFinishSummary() {
  const routines = DB.get('routines', []);
  const day = routines.find(r=>r.id===currentDayId);
  if (!day) return;
  const elapsed = Math.floor((Date.now()-sessionStart)/1000);
  let totalVol = 0, setsCount = 0;
  day.exercises.forEach(ex => {
    for(let i=0;i<20;i++) {
      const r = parseFloat(document.getElementById(`reps-${ex.id}-${i}`)?.value)||0;
      const w = parseFloat(document.getElementById(`weight-${ex.id}-${i}`)?.value)||0;
      if(r||w){totalVol+=r*w;setsCount++;}
    }
  });
  const el = document.getElementById('finish-summary');
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;">
      <div class="stat-mini"><div class="stat-mini-val">${formatTime(elapsed)}</div><div class="stat-mini-label">Tiempo</div></div>
      <div class="stat-mini"><div class="stat-mini-val orange">${Math.round(totalVol/1000)}k</div><div class="stat-mini-label">Volumen kg</div></div>
      <div class="stat-mini"><div class="stat-mini-val green">${setsCount}</div><div class="stat-mini-label">Series</div></div>
    </div>`;
}

function finishWorkout() {
  // Save session to history & check PRs
  const routines = DB.get('routines', []);
  const day = routines.find(r=>r.id===currentDayId);
  if (!day) { closeModal('modal-finish-workout'); return; }
  const hist = DB.get('history', {});
  const prs = DB.get('prs', {});
  const today = new Date().toISOString().split('T')[0];
  let newPRs = [];

  day.exercises.forEach(ex => {
    const sets = [];
    for(let i=0;i<20;i++) {
      const rEl = document.getElementById(`reps-${ex.id}-${i}`);
      const wEl = document.getElementById(`weight-${ex.id}-${i}`);
      if(!rEl) break;
      const r = parseFloat(rEl.value)||0;
      const w = parseFloat(wEl?.value)||0;
      if(r>0) sets.push({reps:r,weight:w});
    }
    if(!sets.length) return;
    if(!hist[ex.id]) hist[ex.id]=[];
    hist[ex.id].push({date:today, sets});
    // PR check
    const maxWeight = Math.max(...sets.map(s=>s.weight));
    if(maxWeight > (prs[ex.id]?.weight||0)) {
      prs[ex.id] = {weight:maxWeight, reps:sets.find(s=>s.weight===maxWeight)?.reps||0, date:today, name:ex.name};
      newPRs.push({name:ex.name, weight:maxWeight});
    }
  });
  DB.set('history', hist);
  DB.set('prs', prs);
  DB.set('streak', DB.get('streak',0)+1);
  DB.set('total_workouts', DB.get('total_workouts',0)+1);

  sessionActive = false;
  clearInterval(sessionTimerInterval);
  closeModal('modal-finish-workout');
  stopRest();

  if(newPRs.length) {
    showPRCelebration(newPRs[0].name, newPRs[0].weight+'kg');
    spawnConfetti();
  }
  showScreen('home');
}

function formatTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════
function startRest(seconds, nextExName) {
  stopRest();
  restTotal = seconds;
  restRemaining = seconds;
  document.getElementById('restTimerSub').textContent = 'Siguiente: '+nextExName;
  document.getElementById('restTimer').classList.add('visible');
  updateRestCircle();
  restTimerInterval = setInterval(()=>{
    restRemaining--;
    document.getElementById('restTimerNum').textContent = restRemaining;
    updateRestCircle();
    if(restRemaining<=0) stopRest();
  },1000);
}

function updateRestCircle() {
  const circ = document.getElementById('restCircle');
  const num = document.getElementById('restTimerNum');
  if(!circ||!num) return;
  const pct = restRemaining/restTotal;
  const dash = 138;
  circ.style.strokeDashoffset = dash*(1-pct);
  num.textContent = restRemaining;
  circ.style.stroke = restRemaining<=10 ? 'var(--red)' : 'var(--accent)';
}

function stopRest() {
  clearInterval(restTimerInterval);
  document.getElementById('restTimer').classList.remove('visible');
}

function skipRest() { stopRest(); }

function renderProgress() {
  const el = document.getElementById('progress-content');
  const routines = DB.get('routines', []);
  const prs = DB.get('prs', {});
  const hist = DB.get('history', {});

  // Build all exercises list
  const allExs = [];
  routines.forEach(r => r.exercises.forEach(e => allExs.push(e)));

  if (!allExs.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-title">Sin datos aún</div><div class="empty-sub">Completa tu primer entreno para ver tu progresión.</div></div>`;
    return;
  }

  const selEx = selectedProgressEx || allExs[0];
  const exHist = hist[selEx.id] || [];
  const pr = prs[selEx.id];

  let html = `<div class="ex-select-scroll">`;
  allExs.forEach(ex => {
    html += `<button class="ex-chip ${ex.id===selEx.id?'active':''}" onclick="selectProgressEx('${ex.id}')">${ex.emoji} ${ex.name}</button>`;
  });
  html += '</div>';

  // PR showcase
  if (pr) {
    const firstWeight = exHist.length ? Math.max(...exHist[0].sets.map(s=>s.weight)) : pr.weight;
    const improvement = pr.weight - firstWeight;
    html += `<div class="pr-showcase">
      <div>
        <div class="pr-showcase-val">${pr.weight}</div>
        <div class="pr-showcase-unit">kg PR</div>
      </div>
      <div class="pr-showcase-info">
        <div class="pr-showcase-name">${selEx.name}</div>
        <div class="pr-showcase-date">📅 ${pr.date}</div>
        ${improvement>0?`<div class="pr-improvement">+${improvement}kg desde inicio</div>`:''}
      </div>
    </div>`;
  }

  // Chart
  html += `<div class="progress-chart-wrap">
    <div class="chart-title">Progresión de peso</div>
    <div class="chart-sub">${selEx.name} · Últimas sesiones</div>
    <div class="chart-area">
      <canvas id="progressChart"></canvas>
    </div>
  </div>`;

  // History
  html += `<div class="section"><div class="section-title">Historial detallado</div></div>`;
  if (!exHist.length) {
    html += `<div style="padding:24px;text-align:center;font-size:13px;color:var(--text3);">Aún no hay sesiones registradas</div>`;
  } else {
    html += `<div class="history-list card" style="margin:0 16px;padding:0 16px;">`;
    [...exHist].reverse().slice(0,10).forEach(session => {
      const maxW = Math.max(...session.sets.map(s=>s.weight));
      const vol = session.sets.reduce((a,s)=>a+s.reps*s.weight,0);
      const isPR = pr && maxW>=pr.weight;
      html += `<div class="history-item">
        <div class="history-date">${session.date.split('-').slice(1).join('/')}</div>
        <div class="history-sets">
          <div class="history-set-row">`;
      session.sets.forEach(s => {
        html += `<span class="history-set-tag ${isPR&&s.weight>=pr.weight?'was-pr':''}">${s.reps}×${s.weight}kg</span>`;
      });
      html += `</div></div>
        <div class="history-vol">${vol}<br><span class="history-vol-unit">kg vol</span></div>
      </div>`;
    });
    html += '</div>';
  }

  html += '<div style="height:16px;"></div>';
  el.innerHTML = html;

  // Draw chart
  setTimeout(() => drawProgressChart(selEx, exHist), 50);
}

function selectProgressEx(exId) {
  const routines = DB.get('routines', []);
  let found = null;
  routines.forEach(r => { const e = r.exercises.find(ex=>ex.id===exId); if(e) found=e; });
  if(found) { selectedProgressEx = found; renderProgress(); }
}

function drawProgressChart(ex, hist) {
  const canvas = document.getElementById('progressChart');
  if (!canvas || !hist.length) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const data = hist.slice(-10).map(s => Math.max(...s.sets.map(x=>x.weight)));
  const labels = hist.slice(-10).map(s => s.date.split('-').slice(1).join('/'));
  const min = Math.max(0, Math.min(...data)*0.9);
  const max = Math.max(...data)*1.05;
  const px = (v) => W * 0.08 + (W*0.84) * (data.indexOf(v)/(data.length-1||1));
  const py = (v) => H*0.85 - (H*0.7)*((v-min)/(max-min||1));

  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for(let i=0;i<=4;i++) {
    const y = H*0.15 + (H*0.7)*(i/4);
    ctx.beginPath(); ctx.moveTo(W*0.08,y); ctx.lineTo(W*0.92,y); ctx.stroke();
  }
  // Gradient fill
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(124,77,255,0.3)');
  grad.addColorStop(1,'rgba(124,77,255,0)');
  ctx.beginPath();
  data.forEach((v,i) => i===0 ? ctx.moveTo(px(v),py(v)) : ctx.lineTo(px(v),py(v)));
  ctx.lineTo(px(data[data.length-1]),H*0.85);
  ctx.lineTo(px(data[0]),H*0.85);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  // Line
  ctx.beginPath();
  ctx.strokeStyle='#7c4dff'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  data.forEach((v,i) => i===0 ? ctx.moveTo(px(v),py(v)) : ctx.lineTo(px(v),py(v)));
  ctx.stroke();
  // Dots
  data.forEach((v,i) => {
    ctx.beginPath();
    ctx.arc(px(v),py(v),4,0,Math.PI*2);
    ctx.fillStyle=i===data.length-1?'var(--accent)':'#7c4dff';
    ctx.fill();
    ctx.strokeStyle='var(--bg)'; ctx.lineWidth=2;
    ctx.stroke();
  });
  // Labels
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font=`${10*window.devicePixelRatio/window.devicePixelRatio}px DM Sans`; ctx.textAlign='center';
  labels.forEach((l,i) => {
    const v=data[i];
    if(i===0||i===data.length-1||data.length<=5) ctx.fillText(l,px(v),H*0.98);
  });
  // Value labels
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.textAlign='center';
  data.forEach((v,i) => {
    ctx.fillText(v+'kg', px(v), py(v)-10);
  });
}

function openAddExercise(dayId) {

  editingExId = null;
  // Reset form
  ['new-ex-name','new-ex-emoji','new-ex-sets','new-ex-reps','new-ex-weight','new-ex-rest'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('new-ex-type').value = 'weight';
  buildEmojiPicker();
  openModal('modal-add-exercise');
}

function editExercise(dayId, exId) {
  editingDayId = dayId;
  editingExId = exId;
  const routines = DB.get('routines', []);
  const day = routines.find(r=>r.id===dayId);
  const ex = day?.exercises.find(e=>e.id===exId);
  if(!ex) return;
  document.getElementById('new-ex-name').value = ex.name;
  document.getElementById('new-ex-emoji').value = ex.emoji;
  document.getElementById('new-ex-sets').value = ex.sets;
  document.getElementById('new-ex-reps').value = ex.reps;
  document.getElementById('new-ex-weight').value = ex.weight;
  document.getElementById('new-ex-rest').value = ex.rest;
  document.getElementById('new-ex-type').value = ex.type||'weight';
  buildEmojiPicker();
  openModal('modal-add-exercise');
}

function buildEmojiPicker() {
  const el = document.getElementById('emoji-picker');
  el.innerHTML = EMOJIS.map(e =>
    `<div onclick="selectEmoji('${e}')" style="width:36px;height:36px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:1px solid var(--border);">${e}</div>`
  ).join('');
}

function selectEmoji(e) {
  document.getElementById('new-ex-emoji').value = e;
}

function saveExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const emoji = document.getElementById('new-ex-emoji').value.trim()||'🏋️';
  const sets = parseInt(document.getElementById('new-ex-sets').value)||4;
  const reps = parseInt(document.getElementById('new-ex-reps').value)||10;
  const weight = parseFloat(document.getElementById('new-ex-weight').value)||0;
  const rest = parseInt(document.getElementById('new-ex-rest').value)||90;
  const type = document.getElementById('new-ex-type').value;
  if (!name) { document.getElementById('new-ex-name').focus(); return; }

  const routines = DB.get('routines', []);
  const dayIdx = routines.findIndex(r=>r.id===editingDayId);
  if(dayIdx<0) return;

  if(editingExId) {
    const exIdx = routines[dayIdx].exercises.findIndex(e=>e.id===editingExId);
    if(exIdx>=0) Object.assign(routines[dayIdx].exercises[exIdx],{name,emoji,sets,reps,weight,rest,type});
  } else {
    routines[dayIdx].exercises.push({id:'e'+Date.now(),name,emoji,sets,reps,weight,rest,type});
  }
  DB.set('routines', routines);
  closeModal('modal-add-exercise');
  renderRoutines();
}

function deleteExercise(dayId, exId) {
  if(!confirm('¿Eliminar este ejercicio?')) return;
  const routines = DB.get('routines', []);
  const dayIdx = routines.findIndex(r=>r.id===dayId);
  if(dayIdx<0) return;
  routines[dayIdx].exercises = routines[dayIdx].exercises.filter(e=>e.id!==exId);
  DB.set('routines', routines);
  renderRoutines();
}

function deleteDay(dayId) {
  if(!confirm('¿Eliminar este día de entrenamiento?')) return;
  const routines = DB.get('routines', []);
  DB.set('routines', routines.filter(r=>r.id!==dayId));
  renderRoutines();
}

function addDay() {
  const name = document.getElementById('new-day-name').value.trim();
  const weekday = parseInt(document.getElementById('new-day-weekday').value);
  if(!name) { document.getElementById('new-day-name').focus(); return; }
  const routines = DB.get('routines', []);
  routines.push({id:'r'+Date.now(), name, weekday, exercises:[]});
  DB.set('routines', routines);
  document.getElementById('new-day-name').value='';
  closeModal('modal-add-day');
  renderRoutines();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if(e.target.id===id) closeModal(id); }

function showPRCelebration(name, val) {
  document.getElementById('celebrateEx').textContent = name;
  document.getElementById('celebrateVal').textContent = val;
  document.getElementById('prCelebration').classList.add('show');
}
function closeCelebration() { document.getElementById('prCelebration').classList.remove('show'); }
function showCelebration() { showPRCelebration('¡Estás en racha!','🔥🔥🔥'); }

function spawnConfetti() {
  const colors = ['#e8ff47','#ff6b35','#7c4dff','#4dffb4','#ff4d6d'];
  for(let i=0;i<40;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-delay:${Math.random()*1}s;
      animation-duration:${1.5+Math.random()*1.5}s;
      transform:scale(${0.5+Math.random()});
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}
